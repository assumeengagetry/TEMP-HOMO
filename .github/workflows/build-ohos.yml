name: Build HarmonyOS HAP

on:
  repository_dispatch:
    types: [build-ohos]
  workflow_dispatch:
    inputs:
      source_repo:
        description: Source Flutter repository
        required: true
        default: The-Brotherhood-of-SCU/Bugaoshan
        type: string
      source_ref:
        description: Branch, tag, or commit to build
        required: true
        default: pak/homo
        type: string
      version:
        description: Release tag or artifact suffix
        required: false
        default: ""
        type: string
      publish_release:
        description: Create a GitHub Release in TEMP-HOMO
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FLUTTER_OH_REPO: https://gitcode.com/openharmony-tpc/flutter_flutter.git
  FLUTTER_OH_REF: oh-3.35.7-dev

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Resolve build context
        id: ctx
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            SOURCE_REPO='${{ github.event.client_payload.source_repo }}'
            SOURCE_REF='${{ github.event.client_payload.source_ref }}'
            SOURCE_SHA='${{ github.event.client_payload.source_sha }}'
            VERSION='${{ github.event.client_payload.version }}'
            PUBLISH='${{ github.event.client_payload.publish_release }}'
          else
            SOURCE_REPO='${{ inputs.source_repo }}'
            SOURCE_REF='${{ inputs.source_ref }}'
            SOURCE_SHA=''
            VERSION='${{ inputs.version }}'
            PUBLISH='${{ inputs.publish_release }}'
          fi

          if [[ -z "${SOURCE_REPO}" ]]; then
            echo "source_repo is required" >&2
            exit 1
          fi

          if [[ -z "${SOURCE_REF}" ]]; then
            echo "source_ref is required" >&2
            exit 1
          fi

          if [[ -z "${SOURCE_SHA}" ]]; then
            SOURCE_SHA=manual
          fi

          if [[ -z "${PUBLISH}" ]]; then
            PUBLISH=false
          fi

          if [[ -z "${VERSION}" ]]; then
            SAFE_REF="${SOURCE_REF//\//-}"
            VERSION="manual-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
          fi

          echo "source_repo=${SOURCE_REPO}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${SOURCE_REF}" >> "${GITHUB_OUTPUT}"
          echo "source_sha=${SOURCE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${PUBLISH}" >> "${GITHUB_OUTPUT}"

      - name: Checkout TEMP-HOMO
        uses: actions/checkout@v4
        with:
          path: wrapper

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.ctx.outputs.source_repo }}
          ref: ${{ steps.ctx.outputs.source_ref }}
          path: source
          fetch-depth: 0

      - name: Prepare Flutter sources for OHOS
        run: |
          rsync -a --delete source/lib/ wrapper/ohos_shell/lib/
          rsync -a --delete source/assets/ wrapper/ohos_shell/assets/
          cp source/pubspec.yaml wrapper/ohos_shell/pubspec.yaml
          cp source/l10n.yaml wrapper/ohos_shell/l10n.yaml

          if grep -q '^dependency_overrides:' wrapper/ohos_shell/pubspec.yaml; then
            echo "wrapper/ohos_shell/pubspec.yaml already contains dependency_overrides; merge OHOS overrides manually first." >&2
            exit 1
          fi

          cat <<'OVERRIDES' >> wrapper/ohos_shell/pubspec.yaml

          dependency_overrides:
            shared_preferences:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/shared_preferences/shared_preferences"
            shared_preferences_ohos:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/shared_preferences/shared_preferences_ohos"
            shared_preferences_foundation:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/shared_preferences/shared_preferences_foundation"

            path_provider:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/path_provider/path_provider"
            path_provider_ohos:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/path_provider/path_provider_ohos"
            path_provider_foundation:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/path_provider/path_provider_foundation"

            url_launcher:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/url_launcher/url_launcher"
            url_launcher_ohos:
              git:
                url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
                path: "packages/url_launcher/url_launcher_ohos"

            flutter_secure_storage:
              git:
                url: "https://gitcode.com/openharmony-sig/fluttertpc_flutter_secure_storage.git"
                path: "flutter_secure_storage"
            flutter_secure_storage_ohos:
              git:
                url: "https://gitcode.com/openharmony-sig/fluttertpc_flutter_secure_storage.git"
                path: "flutter_secure_storage_ohos"
            flutter_secure_storage_platform_interface:
              git:
                url: "https://gitcode.com/openharmony-sig/fluttertpc_flutter_secure_storage.git"
                path: "flutter_secure_storage_platform_interface"

            package_info_plus:
              git:
                url: "https://gitcode.com/openharmony-sig/flutter_plus_plugins.git"
                path: "packages/package_info_plus/package_info_plus"
          OVERRIDES

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Clone Flutter-OH SDK
        run: |
          git clone --depth=1 \
            --branch "${FLUTTER_OH_REF}" \
            "${FLUTTER_OH_REPO}" \
            "${HOME}/flutter_ohos"
          echo "${HOME}/flutter_ohos/bin" >> "${GITHUB_PATH}"

      - name: Create OHOS package.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          path = Path("wrapper/ohos_shell/ohos/package.json")
          data = {
              "dependencies": {
                  "flutter-hvigor-plugin": f"file:{os.environ['HOME']}/flutter_ohos/packages/flutter_tools/hvigor"
              }
          }
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Set Flutter-OH environment
        run: |
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> "${GITHUB_ENV}"
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> "${GITHUB_ENV}"
          echo "FLUTTER_GIT_URL=${FLUTTER_OH_REPO}" >> "${GITHUB_ENV}"

      - name: Flutter pub get
        working-directory: wrapper/ohos_shell
        run: flutter pub get

      - name: Generate code
        working-directory: wrapper/ohos_shell
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        working-directory: wrapper/ohos_shell
        run: flutter gen-l10n

      - name: Setup OpenHarmony environment
        uses: Snapp-Mobile/oh-action@v0.1
        with:
          working-directory: wrapper/ohos_shell/ohos

      - name: Flutter doctor
        working-directory: wrapper/ohos_shell
        run: flutter doctor -v

      - name: Restore signing files
        run: |
          mkdir -p ~/.ohos/config
          echo "${{ secrets.OHOS_P12_BASE64 }}" | base64 -d > ~/.ohos/config/signing.p12
          echo "${{ secrets.OHOS_CER_BASE64 }}" | base64 -d > ~/.ohos/config/signing.cer
          echo "${{ secrets.OHOS_P7B_BASE64 }}" | base64 -d > ~/.ohos/config/signing.p7b

      - name: Build unsigned HAP
        working-directory: wrapper/ohos_shell
        run: flutter build hap --release

      - name: Find build outputs
        id: build
        run: |
          UNSIGNED_HAP="$(find wrapper/ohos_shell -type f -name '*.hap' ! -name '*signed*' | head -1)"
          if [[ -z "${UNSIGNED_HAP}" ]]; then
            echo "Unsigned HAP not found" >&2
            exit 1
          fi

          HAP_SIGN_TOOL="$(find "${HOME}" /opt -type f -name 'hap-sign-tool.jar' 2>/dev/null | head -1)"
          if [[ -z "${HAP_SIGN_TOOL}" ]]; then
            echo "hap-sign-tool.jar not found" >&2
            exit 1
          fi

          echo "unsigned_hap=${UNSIGNED_HAP}" >> "${GITHUB_OUTPUT}"
          echo "hap_sign_tool=${HAP_SIGN_TOOL}" >> "${GITHUB_OUTPUT}"

      - name: Sign HAP
        id: sign
        env:
          OHOS_KEY_ALIAS: ${{ secrets.OHOS_KEY_ALIAS }}
          OHOS_KEY_PASSWORD: ${{ secrets.OHOS_KEY_PASSWORD }}
          OHOS_KEYSTORE_PASSWORD: ${{ secrets.OHOS_KEYSTORE_PASSWORD }}
          OHOS_P12_PASSWORD: ${{ secrets.OHOS_P12_PASSWORD }}
        run: |
          SIGNED_HAP="/tmp/bugaoshan-ohos-${{ steps.ctx.outputs.version }}-signed.hap"
          KEY_ALIAS="${OHOS_KEY_ALIAS:-debugKey}"
          KEY_PASSWORD="${OHOS_KEY_PASSWORD:-$OHOS_P12_PASSWORD}"
          KEYSTORE_PASSWORD="${OHOS_KEYSTORE_PASSWORD:-$OHOS_P12_PASSWORD}"

          java -jar "${{ steps.build.outputs.hap_sign_tool }}" sign-app \
            -keyAlias "${KEY_ALIAS}" \
            -signAlg "SHA256withECDSA" \
            -mode "localSign" \
            -appCertFile ~/.ohos/config/signing.cer \
            -profileFile ~/.ohos/config/signing.p7b \
            -inFile "${{ steps.build.outputs.unsigned_hap }}" \
            -keystoreFile ~/.ohos/config/signing.p12 \
            -outFile "${SIGNED_HAP}" \
            -keyPwd "${KEY_PASSWORD}" \
            -keystorePwd "${KEYSTORE_PASSWORD}"

          echo "signed_hap=${SIGNED_HAP}" >> "${GITHUB_OUTPUT}"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugaoshan-ohos-${{ steps.ctx.outputs.version }}
          path: ${{ steps.sign.outputs.signed_hap }}
          retention-days: 30

      - name: Create GitHub Release
        if: steps.ctx.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ctx.outputs.version }}
          name: HarmonyOS ${{ steps.ctx.outputs.version }}
          body: |
            Source repo: `${{ steps.ctx.outputs.source_repo }}`
            Source ref: `${{ steps.ctx.outputs.source_ref }}`
            Source sha: `${{ steps.ctx.outputs.source_sha }}`
            Flutter-OH ref: `${{ env.FLUTTER_OH_REF }}`
          files: |
            ${{ steps.sign.outputs.signed_hap }}
          draft: false
          prerelease: ${{ contains(steps.ctx.outputs.version, '-') }}
